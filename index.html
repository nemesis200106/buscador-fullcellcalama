<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - FULL CELL CALAMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root { 
            --primario: #0f172a; 
            --accent: #0284c7;
            --rojo-claro: #fff1f2; 
            --borde-rojo: #fecdd3; 
            --fondo: #fcfcfc;
        }
        body { background-color: var(--fondo); font-family: 'Inter', system-ui, sans-serif; color: #334155; margin: 0; padding: 0;}
        
        .header-app { background: white; padding: 2rem 0; border-bottom: 1px solid #f1f5f9; }
        .brand-title { font-weight: 900; letter-spacing: -1.5px; color: var(--primario); font-size: 2.2rem; text-align: center; }
        
        /* --- NUEVA BARRA DE BÚSQUEDA FLOTANTE Y PEGAJOSA --- */
        .sticky-search-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(252, 252, 252, 0.85); /* Semitransparente */
            backdrop-filter: blur(12px); /* Efecto cristal para que se vea moderno */
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 0;
            border-bottom: 1px solid rgba(226, 232, 240, 0.7);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .search-container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
        .search-bar { 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            padding: 16px 25px; 
            font-size: 1.1rem; 
            width: 100%;
            transition: 0.3s;
            background: white;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1); outline: none; }

        /* Cabecera de listado */
        .list-header { 
            display: flex; 
            padding: 10px 30px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #94a3b8; 
            letter-spacing: 1px;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 10px;
        }

        /* Fila de producto */
        .item-row { 
            background: white; 
            border-radius: 10px; 
            padding: 18px 30px; 
            margin-bottom: 10px; 
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .item-row:hover { border-color: #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }

        .no-stock { background-color: var(--rojo-claro) !important; border-color: var(--borde-rojo) !important; }

        /* Sistema de Columnas */
        .col-id { flex: 2.5; }
        .col-desc { flex: 4; padding: 0 20px; } 
        .col-stock { flex: 1.5; text-align: center; }
        .col-price { flex: 1.5; text-align: right; }

        /* Tipografía Interna */
        .item-name { font-weight: 800; font-size: 1.1rem; color: #1e293b; display: block; line-height: 1.2; }
        .product-sku { font-size: 0.7rem; color: #64748b; font-family: monospace; background: #f1f5f9; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 5px;}
        .item-brand { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: 800; display: block; margin-bottom: 2px; }
        .item-desc { font-size: 0.9rem; color: #475569; margin: 0; line-height: 1.4; }
        
        .stock-label { font-size: 0.9rem; font-weight: 700; color: #0f172a; }
        .stock-out { color: #be123c; font-weight: 800; }
        .price-text { font-size: 1.3rem; font-weight: 900; color: #0f172a; }

        /* Loader y Mensajes */
        .status-msg { text-align: center; padding: 40px; font-size: 1.2rem; color: #64748b; }
        .error-msg { color: #dc2626; font-weight: bold; background: #fee2e2; padding: 20px; border-radius: 10px; }

        /* Celulares y Tablets */
        @media (max-width: 992px) {
            .list-header { display: none; }
            .item-row { flex-direction: column; text-align: left; padding: 20px; gap: 10px; }
            .col-desc { padding: 15px 0; width: 100%; border-top: 1px dashed #cbd5e1; border-bottom: 1px dashed #cbd5e1; }
            .col-stock, .col-price { text-align: left; width: 100%; display: flex; justify-content: space-between; align-items: center; }
            .col-price::before { content: "Precio NETO:"; font-size: 0.8rem; color: #64748b; font-weight: bold; }
            .col-stock::before { content: "Stock:"; font-size: 0.8rem; color: #64748b; font-weight: bold; }
        }
    </style>
</head>
<body>

<header class="header-app">
    <div class="container">
        <h1 class="brand-title">FULL CELL CALAMA</h1>
        <p class="text-center text-muted small fw-bold mb-0">SISTEMA DE INVENTARIO TÉCNICO</p>
    </div>
</header>

<div class="sticky-search-wrapper">
    <div class="container search-container">
        <input type="text" id="searchInput" class="form-control search-bar shadow-sm" placeholder="🔍 Buscar código, repuesto, marca o falla..." autocomplete="off">
    </div>
</div>

<main class="container mb-5">
    <div class="list-header d-none d-lg-flex">
        <div class="col-id">Producto / Ref</div>
        <div class="col-desc">Especificaciones</div>
        <div class="col-stock">Estado Stock</div>
        <div class="col-price">Precio NETO</div>
    </div>

    <div id="inventoryList">
        <div class="status-msg">⏳ Sincronizando con la base de datos...</div>
    </div>
</main>

<script>
    // Tu enlace real de Google Sheets inyectado
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs_mhwS-Op3r7iDRB3UZutQc8m5_oe5uDUqHzwbLOmHcsOm6uPtm_nYVQgwb9t1tjIWZ2waAnRlTJA/pub?output=csv'; 

    let inventory = [];

    function loadInventory() {
        Papa.parse(SHEET_CSV, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: function(results) {
                const filas = results.data.slice(1);
                
                inventory = filas.map(c => {
                    return {
                        codigo: c[0] ? c[0].trim() : 'S/N',
                        nombre: c[1] ? c[1].trim() : 'Producto sin nombre',
                        precio: c[2] ? c[2].trim() : '$0',
                        desc: c[3] ? c[3].trim() : '-',
                        marca: c[4] ? c[4].trim() : '',
                        stock: parseInt(c[5]) || 0
                    };
                }).filter(item => item.nombre !== 'Producto sin nombre' && item.nombre !== '');

                render(inventory);
            },
            error: function(error) {
                console.error("Error cargando CSV:", error);
                document.getElementById('inventoryList').innerHTML = `<div class="status-msg error-msg">❌ Error leyendo el archivo. Revisa tu conexión a internet o el enlace del CSV.</div>`;
            }
        });
    }

    function render(list) {
        const container = document.getElementById('inventoryList');
        if (list.length === 0) {
            container.innerHTML = `<div class="status-msg">No se encontraron artículos con esa búsqueda.</div>`;
            return;
        }

        container.innerHTML = list.map(item => {
            const hasStock = item.stock > 0;
            return `
                <div class="item-row ${!hasStock ? 'no-stock' : ''}">
                    <div class="col-id">
                        ${item.marca ? `<span class="item-brand">${item.marca}</span>` : ''}
                        <span class="item-name">${item.nombre}</span>
                        <span class="product-sku">REF: ${item.codigo}</span>
                    </div>

                    <div class="col-desc">
                        <p class="item-desc">${item.desc}</p>
                    </div>

                    <div class="col-stock">
                        <span class="stock-label ${!hasStock ? 'stock-out' : ''}">
                            ${hasStock ? item.stock + ' UNIDADES' : 'AGOTADO'}
                        </span>
                    </div>

                    <div class="col-price">
                        <span class="price-text">${item.precio}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Buscador en tiempo real
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = inventory.filter(i => 
            i.nombre.toLowerCase().includes(term) || 
            i.codigo.toLowerCase().includes(term) ||
            i.desc.toLowerCase().includes(term) ||
            i.marca.toLowerCase().includes(term)
        );
        render(filtered);
    });

    // Iniciar carga
    loadInventory();
</script>

</body>
</html>
