<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Servicios - Calderón 360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --primario: #0056b3; 
            --oscuro: #212529;
            --fondo: #f1f3f5; 
        }
        body { background-color: var(--fondo); font-family: 'Segoe UI', Roboto, sans-serif; }
        .navbar { background: var(--oscuro); color: white; padding: 1rem; }
        .hero-search { 
            background: linear-gradient(135deg, #004a99 0%, #007bff 100%);
            color: white;
            padding: 80px 0;
            margin-bottom: 40px;
        }
        .product-card { 
            border: none; 
            border-radius: 12px; 
            transition: all 0.3s ease; 
            height: 100%;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.1); 
        }
        .img-container { height: 200px; overflow: hidden; border-radius: 12px 12px 0 0; background: #ddd; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .price-tag { color: var(--primario); font-weight: 800; font-size: 1.4rem; }
        .wa-button { background-color: #25D366; color: white; font-weight: bold; border: none; }
        .wa-button:hover { background-color: #1ebe57; color: white; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand mb-0 h1 text-white">CALDERÓN 360</span>
    </div>
</nav>

<div class="hero-search">
    <div class="container text-center">
        <h1 class="display-4 fw-bold mb-3">Catálogo de Repuestos y Equipos</h1>
        <p class="lead mb-4">Encuentra lo que necesitas para tu reparación al instante</p>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <input type="text" id="searchInput" class="form-control form-control-lg shadow" placeholder="Escribe el nombre del repuesto o modelo...">
                <div id="statusMsg" class="mt-3 opacity-75">Conectando con inventario...</div>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4" id="resultsGrid">
        </div>
</div>

<script>
    // --- CONFIGURACIÓN IMPORTANTE ---
    // 1. Pega aquí tu link de Google Sheets (el que termina en .csv)
    const GOOGLE_SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSs_mhwS-Op3r7iDRB3UZutQc8m5_oe5uDUqHzwbLOmHcsOm6uPtm_nYVQgwb9t1tjIWZ2waAnRlTJA/pub?output=csv'; 
    
    // 2. Tu número de WhatsApp para Chile (Ej: 56912345678)
    const MI_WHATSAPP = '569XXXXXXXX'; 
    // --------------------------------

    let database = [];

    async function fetchData() {
        try {
            const res = await fetch(GOOGLE_SHEET_CSV);
            const data = await res.text();
            
            const rows = data.split('\n').slice(1);
            database = rows.map(row => {
                const cols = row.split(',');
                return {
                    nombre: cols[0],
                    precio: cols[1],
                    imagen: cols[2],
                    info: cols[3]
                };
            }).filter(p => p.nombre && p.nombre.trim() !== "");

            document.getElementById('statusMsg').innerText = `Contamos con ${database.length} artículos disponibles`;
            render(database);
        } catch (e) {
            document.getElementById('statusMsg').innerText = "Error al conectar. Verifica el link de Google Sheets.";
        }
    }

    function render(list) {
        const grid = document.getElementById('resultsGrid');
        if (list.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center text-muted"><h3>No se encontraron coincidencias</h3></div>';
            return;
        }

        grid.innerHTML = list.map(item => `
            <div class="col-md-6 col-lg-4">
                <div class="card product-card">
                    <div class="img-container">
                        <img src="${item.imagen || 'https://via.placeholder.com/400x300?text=Sin+Imagen'}" alt="${item.nombre}">
                    </div>
                    <div class="card-body p-4">
                        <h5 class="card-title fw-bold text-uppercase" style="font-size: 1.1rem;">${item.nombre}</h5>
                        <p class="card-text text-muted small">${item.info || 'Sin descripción adicional'}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-tag">${item.precio}</span>
                            <a href="https://wa.me/${MI_WHATSAPP}?text=Hola, me interesa el producto: ${item.nombre}" 
                               target="_blank" class="btn wa-button px-3">
                                Consultar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = database.filter(p => 
            p.nombre.toLowerCase().includes(term) || 
            p.info.toLowerCase().includes(term)
        );
        render(filtered);
    });

    fetchData();
</script>

</body>
</html>
