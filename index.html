<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - FULL CELL CALAMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { 
            --primario: #0f172a; 
            --accent: #0284c7;
            --rojo-claro: #fff1f2; 
            --borde-rojo: #fecdd3; 
        }
        body { background-color: #fcfcfc; font-family: 'Inter', sans-serif; color: #334155; }
        
        .header-app { background: white; padding: 2rem 0; border-bottom: 1px solid #f1f5f9; }
        .brand-title { font-weight: 900; letter-spacing: -1.5px; color: var(--primario); font-size: 2.2rem; text-align: center; }
        
        .search-container { max-width: 900px; margin: -25px auto 40px auto; }
        .search-bar { 
            border-radius: 15px; 
            border: 1px solid #e2e8f0; 
            padding: 16px 25px; 
            font-size: 1.1rem; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
        }

        /* Cabecera de listado */
        .list-header { 
            display: flex; 
            padding: 10px 30px; 
            font-size: 0.7rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: #94a3b8; 
            letter-spacing: 1px;
        }

        /* Fila de producto */
        .item-row { 
            background: white; 
            border-radius: 10px; 
            padding: 15px 30px; 
            margin-bottom: 8px; 
            border: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .item-row:hover { border-color: #cbd5e1; background: #fafafa; }

        .no-stock { background-color: var(--rojo-claro) !important; border-color: var(--borde-rojo) !important; }

        /* Columnas */
        .col-id { flex: 2.5; }      /* Código y Nombre */
        .col-desc { flex: 4; padding: 0 20px; } 
        .col-stock { flex: 1.5; text-align: center; }
        .col-price { flex: 1.5; text-align: right; }

        /* Estilo Discreto para el Código */
        .product-sku { 
            display: block; 
            font-size: 0.65rem; 
            color: #94a3b8; 
            font-family: monospace;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .item-name { font-weight: 700; font-size: 1.05rem; color: #1e293b; line-height: 1.2; }
        .item-brand { font-size: 0.6rem; text-transform: uppercase; color: var(--accent); font-weight: 800; display: block; margin-bottom: 2px; }
        .item-desc { font-size: 0.85rem; color: #64748b; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .stock-label { font-size: 0.8rem; font-weight: 600; }
        .stock-out { color: #be123c; font-weight: 800; }
        
        .price-text { font-size: 1.2rem; font-weight: 800; color: #0f172a; }

        @media (max-width: 992px) {
            .list-header { display: none; }
            .item-row { flex-direction: column; text-align: center; padding: 20px; }
            .col-desc { padding: 10px 0; width: 100%; border-top: 1px solid #f1f5f9; margin: 10px 0; }
            .col-price { text-align: center; width: 100%; }
            .item-desc { white-space: normal; }
        }
    </style>
</head>
<body>

<header class="header-app mb-5">
    <div class="container">
        <h1 class="brand-title">FULL CELL CALAMA</h1>
        <p class="text-center text-muted small fw-bold">LISTADO DE INVENTARIO PRIVADO</p>
    </div>
</header>

<div class="container search-container">
    <input type="text" id="searchInput" class="form-control search-bar" placeholder="Buscar por código, repuesto o descripción...">
</div>

<main class="container mb-5">
    <div class="list-header d-none d-lg-flex">
        <div style="flex: 2.5;">Producto / Código</div>
        <div style="flex: 4; padding-left: 20px;">Detalle Técnico</div>
        <div style="flex: 1.5; text-align: center;">Disponibilidad</div>
        <div style="flex: 1.5; text-align: right;">Precio Neto</div>
    </div>

    <div id="inventoryList"></div>
</main>

<script>
    const SHEET_CSV = 'TU_LINK_DE_GOOGLE_SHEETS_AQUI'; // <--- TU LINK CSV

    let inventory = [];

    async function loadInventory() {
        try {
            const res = await fetch(SHEET_CSV);
            const data = await res.text();
            const rows = data.split('\n').slice(1);

            inventory = rows.map(row => {
                const c = row.split(',');
                return {
                    codigo: c[0],
                    nombre: c[1],
                    precio: c[2],
                    desc: c[3],
                    marca: c[4],
                    stock: parseInt(c[5]) || 0
                };
            }).filter(item => item.nombre);

            render(inventory);
        } catch (e) { console.error("Error:", e); }
    }

    function render(list) {
        const container = document.getElementById('inventoryList');
        container.innerHTML = list.map(item => {
            const hasStock = item.stock > 0;
            return `
                <div class="item-row ${!hasStock ? 'no-stock' : ''}">
                    <div class="col-id">
                        <span class="item-brand">${item.marca || 'GENÉRICO'}</span>
                        <span class="item-name">${item.nombre}</span>
                        <span class="product-sku">REF: ${item.codigo || 'S/N'}</span>
                    </div>

                    <div class="col-desc">
                        <p class="item-desc" title="${item.desc}">${item.desc || '-'}</p>
                    </div>

                    <div class="col-stock">
                        <span class="stock-label ${!hasStock ? 'stock-out' : ''}">
                            ${hasStock ? item.stock + ' U' : 'SIN STOCK'}
                        </span>
                    </div>

                    <div class="col-price">
                        <span class="price-text">${item.precio}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = inventory.filter(i => 
            i.nombre.toLowerCase().includes(term) || 
            i.codigo.toLowerCase().includes(term) ||
            i.desc.toLowerCase().includes(term)
        );
        render(filtered);
    });

    loadInventory();
</script>

</body>
</html>
